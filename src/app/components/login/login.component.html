<div class="auth-container">
  <div class="auth-card">
    <div class="auth-form">
      <h1>Acceda ahora</h1>
      <p class="subtitle">Introduce tus credenciales para acceder</p>
      
      <form (submit)="$event.preventDefault()">
        <div class="field">
          <label>Usuario <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="text" name="email" [(ngModel)]="email" placeholder="nombre@ejemplo.com">
          </div>
        </div>

        <div class="field">
          <label>Contraseña <span class="text-danger">*</span></label>
          <div class="input-group">
            <input type="password" name="password" [(ngModel)]="password" placeholder="Tu contraseña">
          </div>
        </div>

        <div class="options">
          <div class="remember">
            <input type="checkbox" id="rem">
            <label for="rem">Recuérdame</label>
          </div>
          <a href="#">¿Ha olvidado la contraseña?</a>
        </div>

        <button type="submit" (click)="login()">entrar</button>

        <div class="mt-3 text-center">
          <a routerLink="/home" class="btn btn-link text-muted small">toDo >></a>
        </div>
      </form>
    </div>

    <div class="auth-side">
      <div class="overlay">
        <h2>¡toDo App!</h2>
      </div>
    </div>
  </div>
</div>
